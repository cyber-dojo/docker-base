name: Main

on:
  push:
    branches:
      - main

env:
  KOSLI_API_TOKEN: ${{ secrets.KOSLI_API_TOKEN }}
  KOSLI_DEBUG:     ${{ vars.KOSLI_DEBUG }}
  KOSLI_DRY_RUN:   ${{ vars.KOSLI_DRY_RUN }}
  KOSLI_HOST:      ${{ vars.KOSLI_HOST }}
  KOSLI_ORG:       ${{ vars.KOSLI_ORG }}
  KOSLI_FLOW:      ${{ vars.KOSLI_FLOW }}
  KOSLI_TRAIL:     ${{ github.sha }}
  IMAGE_TAR_FILENAME: /tmp/${{ github.event.repository.name }}.${{ github.sha }}.tar

jobs:
  setup:
    runs-on: ubuntu-latest
    needs: []
    outputs:
      image_tag:   ${{ steps.vars.outputs.image_tag }}
      image_name:  ${{ steps.vars.outputs.image_name }}
      branch_name: ${{ steps.vars.outputs.branch_name }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Prepare outputs for workflow jobs
        id: vars
        run: |
          TAG="${GITHUB_SHA:0:7}"
          echo "image_tag=${TAG}"                        >> ${GITHUB_OUTPUT}
          echo "image_name=cyberdojo/docker-base:${TAG}" >> ${GITHUB_OUTPUT}
          echo "branch_name=update-base-image-${TAG}"    >> ${GITHUB_OUTPUT}

      - name: Begin Kosli Trail
        uses: cyber-dojo/kosli-begin-trail@main
        with:
          cli_version: "${{ vars.KOSLI_CLI_VERSION }}"
          flow_description: "Build cyber-dojo/docker-base image"


  build-image:
    runs-on: ubuntu-latest
    needs: [setup]
    env:
      IMAGE_NAME: ${{ needs.setup.outputs.image_name }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Build Docker image
        run:
          make image

      - name: Tar Docker image
        run:
          docker image save "${IMAGE_NAME}"
            --output "${IMAGE_TAR_FILENAME}"

      - name: Cache Docker image
        uses: actions/cache@v4
        with:
          path: ${{ env.IMAGE_TAR_FILENAME }}
          key:  ${{ env.IMAGE_NAME }}


  push-image:
    runs-on: ubuntu-latest
    needs:
      - setup
      - build-image
    env:
      IMAGE_NAME: ${{ needs.setup.outputs.image_name }}
    outputs:
      digest: ${{ steps.variables.outputs.digest }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Retrieve Docker image from cache
        uses: actions/cache@v4
        with:
          path: ${{ env.IMAGE_TAR_FILENAME }}
          key:  ${{ env.IMAGE_NAME }}

      - name: Load Docker image
        run:
          docker image load --input "${IMAGE_TAR_FILENAME}"

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Push docker image to DockerHub
        run:
          docker push "${IMAGE_NAME}"

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Make artifact digest available to following jobs
        id: variables
        run: |
          DIGEST=$(kosli fingerprint "${IMAGE_NAME}" --artifact-type=oci --debug=false)
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}


  snyk-container-scan:
    needs:
      - setup
      - push-image
    uses: cyber-dojo/snyk-scanning/.github/workflows/artifact_snyk_test.yml@main
    with:
      artifact_name:         ${{ needs.setup.outputs.image_name }}
      kosli_flow:            ${{ vars.KOSLI_FLOW }}
      kosli_trail:           ${{ github.sha }}
      kosli_attestation_name: docker-base.snyk-container-scan
    secrets:
      snyk_token:      ${{ secrets.SNYK_TOKEN }}
      kosli_api_token: ${{ secrets.KOSLI_API_TOKEN }}


  sdlc-control-gate:
    runs-on: ubuntu-latest
    needs:
      - push-image
      - snyk-container-scan
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v3
        with:
          version: ${{ vars.KOSLI_CLI_VERSION }}

      - name: Display current compliance
        run:
          kosli get trail "${KOSLI_TRAIL}"

      - name: Kosli SDLC gate to short-circuit the workflow
        env:
          KOSLI_FINGERPRINT: ${{ needs.push-image.outputs.digest }}
        run:
          kosli assert artifact


  create-pr-on-downstream-repos:
    needs:
      - setup
      - push-image
      - sdlc-control-gate
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: ${{ needs.setup.outputs.branch_name }}
    strategy:
      matrix:
        repo: [ commander, runner ]
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: cyber-dojo/${{ matrix.repo }}
          token: ${{ secrets.BASE_IMAGE_UPGRADE }}
          fetch-depth: 0

      - name: Create branch
        run:
          git checkout -b ${BRANCH_NAME}

      - name: Edit 1st line of Dockerfile
        env:
          BASE_IMAGE: cyberdojo/docker-base:${{ needs.setup.outputs.image_tag }}@sha256:${{ needs.push-image.outputs.digest }}
        run: |
          cp Dockerfile Dockerfile.original
          echo "FROM ${BASE_IMAGE}" > Dockerfile
          cat Dockerfile.original | tail -n+2 >> Dockerfile
          rm Dockerfile.original

      - name: Commit
        run: |
          git config --global user.name "{{ github.actor }}"
          git config --global user.email "${{ github.event.sender.login }}@users.noreply.github.com"
          git add .
          git commit --message "Dockerfile - Automated base-image update"
          git push --set-upstream origin ${BRANCH_NAME}

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.BASE_IMAGE_UPGRADE }}
        run:
          gh pr create
            --base main
            --head ${BRANCH_NAME}
            --title 'Merge update-base-image into main'
            --body 'Created by Github action'
